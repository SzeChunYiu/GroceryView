name: DAST Preview

on:
  pull_request:

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  zap-baseline:
    name: OWASP ZAP passive baseline
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Vercel preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const deadline = Date.now() + 10 * 60 * 1000;

            while (Date.now() < deadline) {
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                owner,
                repo,
                ref,
                environment: 'Preview',
                per_page: 100
              });

              for (const deployment of deployments) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  per_page: 10
                });
                const success = statuses.data.find((status) => status.state === 'success');
                const previewUrl = success?.environment_url || success?.target_url;
                if (previewUrl) {
                  core.exportVariable('DAST_PREVIEW_URL', previewUrl);
                  core.info(`Resolved Vercel preview URL: ${previewUrl}`);
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            core.setFailed(`No successful Vercel Preview deployment found for ${ref}; DAST requires a deployed preview.`);

      - name: Run non-destructive ZAP baseline scans
        if: env.DAST_PREVIEW_URL != ''
        env:
          ZAP_ROUTES: >-
            /
            /products
            /compare
            /deals
            /items
            /categories
            /map
            /basket
            /settings
            /data-sources
            /api/openapi.json
            /api/health
        run: |
          set -euo pipefail
          mkdir -p zap-preview
          base="${DAST_PREVIEW_URL%/}"
          for route in ${ZAP_ROUTES}; do
            safe_route="${route#/}"
            safe_route="${safe_route//[^a-zA-Z0-9._-]/_}"
            safe_route="${safe_route:-home}"
            target="${base}${route}"
            docker run --rm --network host -v "${PWD}/zap-preview:/zap/wrk:rw" ghcr.io/zaproxy/zaproxy:stable \
              zap-baseline.py \
              -t "${target}" \
              -m 5 \
              -I \
              -r "${safe_route}.html" \
              -J "${safe_route}.json" \
              -w "${safe_route}.md"
          done

      - name: Fail on high-confidence high-severity findings
        if: env.DAST_PREVIEW_URL != ''
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, json, sys
          findings = []
          for path in glob.glob('zap-preview/*.json'):
              with open(path, encoding='utf-8') as fh:
                  report = json.load(fh)
              for site in report.get('site', []):
                  for alert in site.get('alerts', []):
                      risk = str(alert.get('riskcode', alert.get('riskdesc', ''))).lower()
                      confidence = str(alert.get('confidence', alert.get('confidencedesc', ''))).lower()
                      high_risk = risk == '3' or risk.startswith('high') or 'high' in risk
                      high_confidence = confidence == '3' or confidence.startswith('high') or 'high' in confidence
                      if high_risk and high_confidence:
                          findings.append(f"{path}: {alert.get('name', 'unnamed alert')} ({alert.get('riskdesc', risk)} / {alert.get('confidencedesc', confidence)})")
          if findings:
              print('High-confidence high-severity ZAP findings detected:')
              print('\n'.join(findings))
              sys.exit(1)
          print('No high-confidence high-severity ZAP findings detected.')
          PY

      - name: Upload ZAP preview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-preview-dast
          path: zap-preview
          if-no-files-found: ignore
