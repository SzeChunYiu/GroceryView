name: Lighthouse Preview

on:
  pull_request:

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  lighthouse:
    name: Vercel preview performance budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Vercel preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const headRef = context.payload.pull_request.head.ref;
            const deadline = Date.now() + 10 * 60 * 1000;
            const diagnostics = new Map();

            while (Date.now() < deadline) {
              const deploymentQueries = [
                { ref, environment: 'Preview' },
                { ref: headRef, environment: 'Preview' },
                { ref },
                { ref: headRef }
              ];

              const deploymentsById = new Map();
              for (const query of deploymentQueries) {
                const deployments = await github.paginate(github.rest.repos.listDeployments, {
                  owner,
                  repo,
                  ...query,
                  per_page: 100
                });

                for (const deployment of deployments) {
                  deploymentsById.set(deployment.id, deployment);
                }
              }

              const deployments = [...deploymentsById.values()]
                .filter((deployment) => deployment.sha === ref)
                .filter((deployment) => (deployment.environment || '').toLowerCase().includes('preview'));

              for (const deployment of deployments) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  per_page: 10
                });

                diagnostics.set(
                  deployment.id,
                  `deployment ${deployment.id}: ref=${deployment.ref} sha=${deployment.sha} environment=${deployment.environment} statuses=${
                    statuses.data
                      .slice(0, 5)
                      .map((status) => `${status.state}:${status.environment_url || status.target_url || 'no-url'}`)
                      .join(', ') || 'none'
                  }`
                );

                const success = statuses.data.find((status) => status.state === 'success');
                const previewUrl = success?.environment_url || success?.target_url;

                if (previewUrl) {
                  core.exportVariable('LHCI_PREVIEW_URL', previewUrl);
                  core.info(`Resolved Vercel preview URL: ${previewUrl}`);
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            const seenDeployments = [...diagnostics.values()].slice(0, 20).join('\n');
            const details = seenDeployments || `No Preview deployments found for commit ${ref} or branch ${headRef}. Verify Vercel is creating GitHub Preview deployments for pull requests and publishing a deployment status URL.`;
            throw new Error(`Timed out waiting for a successful Vercel Preview deployment for ${ref}.\n${details}`);

      - name: Run Lighthouse CI against Vercel preview
        run: npm run perf:lighthouse:preview -w @groceryview/web
