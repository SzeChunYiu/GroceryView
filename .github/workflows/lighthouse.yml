name: Lighthouse Preview

on:
  pull_request:

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  lighthouse:
    name: Vercel preview performance budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify PR changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          run_preview=false
          while IFS= read -r name; do
            case "$name" in
              .github/workflows/lighthouse.yml|docs/data-sources.md|docs/ingestion/*|apps/web/src/lib/ingested/*|packages/ingestion/*|scripts/ingestion/*)
                ;;
              *)
                run_preview=true
                break
                ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          echo "run_preview=$run_preview" >> "$GITHUB_OUTPUT"
          if [ "$run_preview" = "false" ]; then
            echo "Skipping Vercel preview Lighthouse for ingestion-data-only PR."
          fi

      - name: Setup Node
        if: steps.changes.outputs.run_preview == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.run_preview == 'true'
        run: npm ci

      - name: Resolve Vercel preview URL
        if: steps.changes.outputs.run_preview == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const deadline = Date.now() + 10 * 60 * 1000;

            while (Date.now() < deadline) {
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                owner,
                repo,
                ref,
                environment: 'Preview',
                per_page: 100
              });

              for (const deployment of deployments) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  per_page: 10
                });

                const success = statuses.data.find((status) => status.state === 'success');
                const previewUrl = success?.environment_url || success?.target_url;

                if (previewUrl) {
                  core.exportVariable('LHCI_PREVIEW_URL', previewUrl);
                  core.info(`Resolved Vercel preview URL: ${previewUrl}`);
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            throw new Error(`Timed out waiting for a successful Vercel Preview deployment for ${ref}.`);

      - name: Run Lighthouse CI against Vercel preview
        if: steps.changes.outputs.run_preview == 'true'
        run: npm run perf:lighthouse:preview -w @groceryview/web
