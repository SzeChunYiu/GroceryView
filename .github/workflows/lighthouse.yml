name: Lighthouse per-page budgets

on:
  pull_request:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse budgets for top routes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build -w @groceryview/web

      - name: Run Lighthouse CI per-page budgets
        run: npx lhci autorun --config=.lighthouserc.json
