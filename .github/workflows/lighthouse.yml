name: Lighthouse Preview

on:
  pull_request:

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  lighthouse:
    name: Vercel preview performance budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Vercel preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const deadline = Date.now() + 10 * 60 * 1000;

            while (Date.now() < deadline) {
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                owner,
                repo,
                ref,
                environment: 'Preview',
                per_page: 100
              });

              for (const deployment of deployments) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  per_page: 10
                });

                const success = statuses.data.find((status) => status.state === 'success');
                const previewUrl = success?.environment_url || success?.target_url;

                if (previewUrl) {
                  core.exportVariable('LHCI_PREVIEW_URL', previewUrl);
                  core.info(`Resolved Vercel preview URL: ${previewUrl}`);
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            throw new Error(`Timed out waiting for a successful Vercel Preview deployment for ${ref}.`);

      - name: Run Lighthouse CI against Vercel preview
        run: |
          mkdir -p apps/web/.lighthouseci-preview
          npm run perf:lighthouse:preview -w @groceryview/web 2>&1 | tee apps/web/.lighthouseci-preview/lhci.log
          echo "${PIPESTATUS[0]}" > apps/web/.lighthouseci-preview/lhci.exitcode
          exit "$(cat apps/web/.lighthouseci-preview/lhci.exitcode)"

      - name: Write Lighthouse failure summary
        if: always()
        run: |
          summary_dir=apps/web/.lighthouseci-preview
          mkdir -p "$summary_dir"
          exit_code="unknown"
          if [ -f "$summary_dir/lhci.exitcode" ]; then
            exit_code="$(cat "$summary_dir/lhci.exitcode")"
          fi

          {
            echo "# Lighthouse CI preview summary"
            echo
            echo "- Preview URL: ${LHCI_PREVIEW_URL:-not resolved}"
            echo "- LHCI exit code: $exit_code"
            echo "- Finished at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "## Last LHCI log lines"
            echo '```'
            if [ -f "$summary_dir/lhci.log" ]; then
              tail -n 120 "$summary_dir/lhci.log"
            else
              echo "LHCI log was not created."
            fi
            echo '```'
          } > "$summary_dir/summary.txt"

      - name: Upload Lighthouse preview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-preview
          path: apps/web/.lighthouseci-preview
          if-no-files-found: warn
