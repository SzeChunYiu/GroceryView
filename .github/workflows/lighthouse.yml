name: Lighthouse Preview

on:
  pull_request:

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  lighthouse:
    name: Vercel preview performance budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Vercel preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const deadline = Date.now() + 10 * 60 * 1000;

            while (Date.now() < deadline) {
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                owner,
                repo,
                ref,
                environment: 'Preview',
                per_page: 100
              });

              for (const deployment of deployments) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  per_page: 10
                });

                const success = statuses.data.find((status) => status.state === 'success');
                const previewUrl = success?.environment_url || success?.target_url;

                if (previewUrl) {
                  core.exportVariable('LHCI_PREVIEW_URL', previewUrl);
                  core.info(`Resolved Vercel preview URL: ${previewUrl}`);
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            core.notice(`No successful Vercel Preview deployment found for ${ref}; skipping preview-only Lighthouse budget.`);

      - name: Expand Lighthouse route budget matrix
        if: env.LHCI_PREVIEW_URL != ''
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const baseUrl = process.env.LHCI_PREVIEW_URL.replace(/\/$/, '');
          const config = JSON.parse(readFileSync('.lighthouserc.json', 'utf8'));
          config.ci.collect.url = config.ci.collect.url.map((url) => url.replace('__LHCI_PREVIEW_URL__', baseUrl));
          writeFileSync('.lighthouserc.json', `${JSON.stringify(config, null, 2)}\n`);
          console.log(`Prepared Lighthouse budgets for ${config.ci.collect.url.length} preview routes.`);
          NODE

      - name: Run Lighthouse CI against Vercel preview
        if: env.LHCI_PREVIEW_URL != ''
        run: npm run perf:lighthouse:preview -w @groceryview/web
