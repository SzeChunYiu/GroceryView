name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Verify and deploy from manifest
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit production secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ops:check-production-secrets -- --repo "$GITHUB_REPOSITORY" --env production
      - name: Run tests
        run: npm test
      - name: Build workspaces
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Validate deployment manifest
        run: test -f deploy/groceryview.manifest.json && cat deploy/groceryview.manifest.json
      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN"
      - name: Verify production visible artifact
        env:
          GROCERYVIEW_PRODUCTION_URL: ${{ vars.GROCERYVIEW_PRODUCTION_URL }}
        run: node apps/web/scripts/check-production-visible-artifact.mjs
