# GroceryView release gate — optimized for high PR throughput + always-green main.
#  - pull_request: LIGHT check (typecheck + secret-scan, node_modules cached) → fast PR iteration.
#  - merge_group: FULL build + test, batched by the merge queue → main stays green, build amortized
#    over batches instead of run per-PR.
#  - push(main): full build + test as a post-merge safety net.
name: Release validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate release-safe candidate
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - name: Cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Secret scan
        run: |
          if git grep -nE "(SUPABASE_SERVICE_ROLE|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)" \
              -- ':!*.example' ':!**/*.md' ':!.github/**' ':!**/package-lock.json'; then
            echo "::error::potential committed secret"; exit 1
          fi

  merge-gate:
    name: Merge queue full check
    if: github.event_name == 'merge_group' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - name: Cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  accessibility-gate:
    name: WCAG 2.2 AA accessibility gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - name: Cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run axe WCAG gate
        run: npm run a11y:ci -w @groceryview/web
      - name: Upload accessibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcag-2-2-aa-accessibility-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/e2e/test-results/a11y/*.json
            apps/web/e2e/test-results/junit.xml
            apps/web/e2e/playwright-report
          if-no-files-found: ignore
