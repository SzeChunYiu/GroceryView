# GroceryView release gate. PR check ("Validate release-safe candidate") is intentionally
# LIGHT for high PR/merge throughput: typecheck + secret-scan only (~30-60s). The heavy
# build + full ~19-workspace test run POST-MERGE on main (job "Full build + test"),
# non-blocking — caught/fixed in bulk rather than gating every PR.
name: Release validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate release-safe candidate
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Secret scan (no committed credentials)
        run: |
          if git grep -nE "(SUPABASE_SERVICE_ROLE|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)" \
              -- ':!*.example' ':!**/*.md' ':!.github/**' ':!**/package-lock.json'; then
            echo "::error::potential committed secret"; exit 1
          fi

  fullcheck:
    name: Full build + test (post-merge)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
