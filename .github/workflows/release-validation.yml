# GroceryView release gate — optimized for high PR throughput.
# PR check = typecheck + secret-scan, with node_modules cached by lockfile hash so
# `npm ci` is skipped on the (near-always) cache hit. Heavy build + full test run
# POST-MERGE on main (job "Full build + test"), non-blocking — bulk-checked.
name: Release validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate release-safe candidate
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules (skip install when lockfile unchanged)
        id: nmcache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install (only on cache miss)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Secret scan (no committed credentials)
        run: |
          if git grep -nE "(SUPABASE_SERVICE_ROLE|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)" \
              -- ':!*.example' ':!**/*.md' ':!.github/**' ':!**/package-lock.json'; then
            echo "::error::potential committed secret"; exit 1
          fi

  fullcheck:
    name: Full build + test (post-merge)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules
        id: nmcache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install (only on cache miss)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
