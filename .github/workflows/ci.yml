name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  verify:
    name: Test, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Annotate Renovate-run CI
        if: github.actor == 'renovate[bot]'
        run: echo "Running CI on Renovate dependency update"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build workspaces
        run: npm run build
      - name: Lighthouse performance budget
        run: npm run perf:lighthouse:ci -w @groceryview/web
      - name: Typecheck
        run: npm run typecheck
