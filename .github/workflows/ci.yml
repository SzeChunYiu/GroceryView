name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  renovate-config:
    name: Validate Renovate config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Validate Renovate config
        run: npm run renovate:validate

  verify:
    name: Test, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build workspaces
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
