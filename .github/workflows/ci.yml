name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Test, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Restore Turborepo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('package-lock.json', 'turbo.json', 'apps/*/package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
      - name: Build workspaces
        run: npm run build
      - name: Lighthouse performance budget
        run: npm run perf:lighthouse:ci -w @groceryview/web
      - name: Typecheck
        run: npm run typecheck
