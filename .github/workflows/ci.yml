name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Test, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build workspaces
        run: npm run build
      - name: Link checker guardrails
        timeout-minutes: 2
        env:
          CHECK_LINKS_REQUEST_TIMEOUT_MS: '10000'
          CHECK_LINKS_MAX_PAGES: '50000'
        run: node scripts/checkLinks.ts apps/web/.next/routes-manifest.json https://grocery-web-mu.vercel.app/sitemap.xml
      - name: Next profile bundle budget
        run: npm run perf:bundle:profile -w @groceryview/web
      - name: Lighthouse performance budget
        run: npm run perf:lighthouse:ci -w @groceryview/web
      - name: Typecheck
        run: npm run typecheck
