name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  prisma-migrations:
    name: Prisma migration gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: groceryview_migration_test
          POSTGRES_USER: groceryview
          POSTGRES_PASSWORD: groceryview
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U groceryview -d groceryview_migration_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify Prisma migrations on fresh Postgres
        env:
          DATABASE_URL: postgresql://groceryview:groceryview@localhost:5432/groceryview_migration_test
        run: scripts/ci-migrate.sh

  verify:
    name: Test, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        id: install
        run: npm ci
      - name: Run tests with SE/NO/IS fixtures
        id: tests
        env:
          GROCERYVIEW_CI_FIXTURE_COUNTRIES: SE,NO,IS
        run: npm test
      - name: Build workspaces
        id: build
        run: npm run build
      - name: Next profile bundle budget
        id: profile_bundle
        run: npm run perf:bundle:profile -w @groceryview/web
      - name: Web bundle PR summary
        id: bundle_pr_summary
        run: npm run perf:bundle:pr-summary -w @groceryview/web
      - name: Lighthouse performance budget
        id: lighthouse_budget
        run: npm run perf:lighthouse:ci -w @groceryview/web
      - name: Typecheck
        id: typecheck
        run: npm run typecheck
      - name: Generate dated test report
        if: always()
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PROFILE_BUNDLE_OUTCOME: ${{ steps.profile_bundle.outcome }}
          BUNDLE_PR_SUMMARY_OUTCOME: ${{ steps.bundle_pr_summary.outcome }}
          LIGHTHOUSE_OUTCOME: ${{ steps.lighthouse_budget.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          JOB_STATUS: ${{ job.status }}
        run: node --experimental-strip-types scripts/test-report.ts
      - name: Upload dated test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            docs/test-results/*.md
            docs/testing/INDEX.md
