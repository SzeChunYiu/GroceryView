name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Test, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm run unit-test
      - name: Run integration tests
        run: npm run integration-test
      - name: Build workspaces
        run: npm run build
      - name: Typecheck
        run: npm run typecheck

      - name: Validate Vercel monorepo config
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';
          const config = JSON.parse(fs.readFileSync('vercel.json', 'utf8'));
          const required = ['rootDirectory', 'buildCommand', 'outputDirectory'];
          const missing = required.filter((key) => typeof config[key] !== 'string' || config[key].trim().length === 0);
          if (missing.length > 0) {
            console.error(`Missing Vercel config keys: ${missing.join(', ')}`);
            process.exit(1);
          }
          if (config.rootDirectory !== 'apps/web') {
            console.error(`Unexpected Vercel rootDirectory "${config.rootDirectory}"`);
            process.exit(1);
          }
          if (!config.buildCommand.includes('-w @groceryview/web')) {
            console.error(`Unexpected Vercel buildCommand "${config.buildCommand}"`);
            process.exit(1);
          }
          if (!config.outputDirectory.startsWith('apps/web/') && config.outputDirectory !== 'dist') {
            console.error(`Unexpected Vercel outputDirectory "${config.outputDirectory}"`);
            process.exit(1);
          }
          console.log('Vercel configuration validated for monorepo web deployment.');
          EOF
