name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Test, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Restore build and link checker caches
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next/cache
            .link-check-cache
          key: ${{ runner.os }}-groceryview-ci-${{ hashFiles('package-lock.json', 'apps/web/package.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-groceryview-ci-${{ hashFiles('package-lock.json', 'apps/web/package.json') }}-
            ${{ runner.os }}-groceryview-ci-
      - name: Install dependencies
        id: install
        run: npm ci
      - name: Run tests with SE/NO/IS fixtures
        id: tests
        env:
          GROCERYVIEW_CI_FIXTURE_COUNTRIES: SE,NO,IS
        run: npm test
      - name: Build workspaces
        id: build
        run: npm run build
      - name: Check route and sitemap links
        id: link_checker
        env:
          LINK_CHECK_TIMEOUT_MS: '10000'
          LINK_CHECK_MAX_MANIFEST_ROUTES: '2000'
          LINK_CHECK_MAX_SITEMAP_LINKS: '5000'
          LINK_CHECK_CACHE_DIR: .link-check-cache
        run: node --experimental-strip-types scripts/checkLinks.ts apps/web/.next/routes-manifest.json https://grocery-web-mu.vercel.app/sitemap.xml
      - name: Next profile bundle budget
        id: profile_bundle
        run: npm run perf:bundle:profile -w @groceryview/web
      - name: Lighthouse performance budget
        id: lighthouse_budget
        run: npm run perf:lighthouse:ci -w @groceryview/web
      - name: Typecheck
        id: typecheck
        run: npm run typecheck
      - name: Generate dated test report
        if: always()
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PROFILE_BUNDLE_OUTCOME: ${{ steps.profile_bundle.outcome }}
          LIGHTHOUSE_OUTCOME: ${{ steps.lighthouse_budget.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          JOB_STATUS: ${{ job.status }}
        run: node --experimental-strip-types scripts/test-report.ts
      - name: Upload dated test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            docs/test-results/*.md
            docs/testing/INDEX.md
