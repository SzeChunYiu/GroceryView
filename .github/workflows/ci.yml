name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Test, build, and typecheck (${{ matrix.country }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        country: [SE, NO, IS]
    env:
      GROCERYVIEW_TEST_COUNTRY: ${{ matrix.country }}
      GROCERYVIEW_TEST_FIXTURE: tests/fixtures/nordic/${{ matrix.country }}.json
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build workspaces
        run: npm run build
      - name: Next profile bundle budget
        run: npm run perf:bundle:profile -w @groceryview/web
      - name: Lighthouse performance budget
        run: npm run perf:lighthouse:ci -w @groceryview/web
      - name: Typecheck
        run: npm run typecheck
