name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Test, lint, build, and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint workspace apps/web
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Build workspaces
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
