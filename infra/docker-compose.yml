services:
  postgres:
    image: postgis/postgis:18-3.6
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-groceryview}
      POSTGRES_USER: ${POSTGRES_USER:-groceryview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-groceryview}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-storage:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-groceryview}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-groceryview-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - object-storage-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-storage-init:
    image: minio/mc:latest
    depends_on:
      object-storage:
        condition: service_healthy
    environment:
      S3_BUCKET: ${S3_BUCKET:-groceryview-raw}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-groceryview}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-groceryview-secret}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://object-storage:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["tools"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@groceryview.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-groceryview}
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  object-storage-data:
  pgadmin-data:
