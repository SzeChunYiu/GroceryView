# GroceryView local development services.
# Worker/API lanes: use `docker compose -f infra/docker-compose.yml up -d postgres redis`
# to develop against a real local PostgreSQL/PostGIS database instead of mocks.
services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: groceryview-postgres
    environment:
      POSTGRES_DB: groceryview
      POSTGRES_USER: groceryview
      POSTGRES_PASSWORD: groceryview
    ports:
      - "5432:5432"
    volumes:
      - groceryview-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groceryview -d groceryview"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: groceryview-redis
    ports:
      - "6379:6379"
    volumes:
      - groceryview-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: groceryview-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@groceryview.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-groceryview}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["admin"]

  minio:
    image: minio/minio:latest
    container_name: groceryview-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-groceryview}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-groceryview-minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - groceryview-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-bucket:
    image: minio/mc:latest
    container_name: groceryview-minio-bucket
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-groceryview}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-groceryview-minio}
      S3_BUCKET: ${S3_BUCKET:-groceryview-raw}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"
        mc mb --ignore-existing "local/$$S3_BUCKET"

volumes:
  groceryview-postgres-data:
  groceryview-redis-data:
  groceryview-minio-data:
