services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: groceryview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: groceryview
      POSTGRES_USER: groceryview
      POSTGRES_PASSWORD: groceryview
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groceryview -d groceryview"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: groceryview-pgbouncer
    restart: unless-stopped
    # Local API DATABASE_POOL_URL: postgres://groceryview:groceryview@localhost:6432/groceryview
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: groceryview
      DB_USER: groceryview
      DB_PASSWORD: groceryview
      AUTH_TYPE: trust
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-500}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-5}
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U groceryview -d groceryview"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: groceryview-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: groceryview-pgadmin
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@groceryview.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-groceryview}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  object-storage:
    image: minio/minio:latest
    container_name: groceryview-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-groceryview}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-groceryview-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-storage-init:
    image: minio/mc:latest
    container_name: groceryview-minio-init
    depends_on:
      object-storage:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-groceryview}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-groceryview-secret}
      S3_BUCKET: ${S3_BUCKET:-groceryview-raw}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://object-storage:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"

volumes:
  postgres-data:
  pgadmin-data:
  minio-data:
