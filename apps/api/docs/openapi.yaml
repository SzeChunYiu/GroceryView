          description: Basket item quantity updated
      tags: *a13
    delete:
      operationId: BasketsController_removeItem
      parameters:
        - name: productId
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Basket item removed
      tags: *a13
  /baskets/compare:
    post:
      operationId: RealBasketsController_compare
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareBasketRequestDto"
      responses:
        "200":
          description: Compare an arbitrary basket using persisted latest price rows
      tags: &a14
        - baskets
  /users/{userId}/basket/compare:
    get:
      operationId: RealBasketsController_compareSaved
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: stores
          required: true
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Compare the latest saved user basket using persisted latest price
            rows
      tags: *a14
  /users/demo/budget/summary:
    get:
      operationId: BudgetsController_summary
      parameters: []
      responses:
        "200":
          description: Demo household budget summary with current basket estimate
      tags: &a15
        - budgets
  /users/demo/budget/categories:
    get:
      operationId: BudgetsController_categories
      parameters: []
      responses:
        "200":
          description: Demo household category budget summary from the current basket
      tags: *a15
  /categories:
    get:
      operationId: CategoriesController_list
      parameters: []
      responses:
        "200":
          description: Full category tree with id, name, slug, parentId, and itemCount
            metadata
      tags: *a16
  /users/demo/alerts:
    get:
      operationId: AlertsController_list
      parameters: []
      responses:
        "200":
          description: Demo user alert stream
      tags: &a17
        - alerts
  /users/demo/alerts/inbox:
    get:
      operationId: AlertsController_inbox
      parameters: []
      responses:
        "200":
          description: Demo user notification inbox queue
      tags: *a17
