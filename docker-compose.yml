services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: groceryview
      POSTGRES_PASSWORD: groceryview
      POSTGRES_USER: groceryview
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groceryview -d groceryview"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - groceryview-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "6379:6379"

  api:
    image: node:24-alpine
    working_dir: /workspace
    command: >
      sh -lc "npm ci &&
      npm run build -w @groceryview/api-app &&
      node apps/api/dist/main.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_CORS_ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_POOL_MODE: direct
      DATABASE_URL: postgresql://groceryview:groceryview@postgres:5432/groceryview
      NODE_ENV: development
      PORT: "3001"
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - groceryview-node-modules:/workspace/node_modules

volumes:
  groceryview-node-modules:
  groceryview-postgres-data:
