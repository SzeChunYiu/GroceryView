services:
  postgres:
    image: postgres:16-alpine
    container_name: groceryview-postgres
    environment:
      POSTGRES_DB: groceryview
      POSTGRES_USER: groceryview
      POSTGRES_PASSWORD: groceryview
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groceryview -d groceryview"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: groceryview-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    image: node:20-bookworm-slim
    container_name: groceryview-api
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://groceryview:groceryview@postgres:5432/groceryview
      REDIS_URL: redis://redis:6379
      PUBLIC_WEB_URL: http://localhost:3000,http://localhost:5173
      API_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
      AUTH_SECRET: dev-compose-change-me
      REQUEST_LOGGING_ENABLED: "true"
      SCRAPER_SCHEDULER_ENABLED: "false"
      OPENFOODFACTS_USER_AGENT: GroceryView/0.1 (local-compose@groceryview.local)
    ports:
      - "${API_PORT:-3001}:3001"
    command: >
      sh -c "npm ci &&
      npx prisma migrate deploy &&
      npm run build -w @groceryview/api-app &&
      node apps/api/dist/main.js"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s
    volumes:
      - .:/workspace
      - node-modules:/workspace/node_modules

volumes:
  node-modules:
  postgres-data:
  redis-data:
